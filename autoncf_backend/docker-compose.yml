services:
  autoncf_backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: autoncf_backend_container
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    restart: always